<!DOCTYPE html>
<!--
  /recruiter/login.html — Sprint 1.6 Track A
  Midnight Executive theme; vanilla JS; cookie-based JWT auth via /recruiter/api/login.
  Stream B drops this into services/readybank/public/recruiter/login.html
  served by the same static handler that serves dashboard.html.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Recruiter Login · QOrium</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0b1220;
    --panel: #111a2e;
    --border: #233152;
    --text: #e6ecf5;
    --muted: #8da3c7;
    --accent: #f59e0b;
    --accent-hover: #fbbf24;
    --error: #ef4444;
    --success: #22c55e;
    --radius: 10px;
    --shadow: 0 12px 40px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: radial-gradient(circle at 20% 20%, #1a2746 0%, var(--bg) 60%);
    color: var(--text);
  }
  .stage { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .card {
    width: 100%; max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px 28px;
    box-shadow: var(--shadow);
  }
  .brand {
    font-size: 22px; font-weight: 700; letter-spacing: 0.2px;
    margin: 0 0 4px; color: var(--text);
  }
  .brand span { color: var(--accent); }
  .subtitle {
    font-size: 13px; color: var(--muted); margin: 0 0 28px;
  }
  label {
    display: block; font-size: 13px; color: var(--muted);
    margin: 18px 0 6px; font-weight: 500;
  }
  input[type=email], input[type=password] {
    width: 100%;
    padding: 11px 13px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0d1729;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.15s ease;
  }
  input[type=email]:focus, input[type=password]:focus {
    outline: none;
    border-color: var(--accent);
  }
  button[type=submit] {
    width: 100%;
    margin-top: 24px;
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #0b1220;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button[type=submit]:hover { background: var(--accent-hover); }
  button[type=submit]:disabled { opacity: 0.55; cursor: not-allowed; }
  .error {
    color: var(--error);
    font-size: 13px;
    margin-top: 16px;
    min-height: 18px;
  }
  .footer {
    margin-top: 22px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
  .footer a { color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--muted); }
</style>
</head>
<body>
<main class="stage">
  <section class="card" aria-labelledby="brand">
    <h1 id="brand" class="brand">Q<span>Orium</span></h1>
    <p class="subtitle">Recruiter sign in</p>

    <form id="loginForm" autocomplete="on" novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="username" autofocus>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" minlength="8">

      <button type="submit" id="submitBtn">Sign in</button>
      <div class="error" id="error" role="alert" aria-live="polite"></div>
    </form>

    <p class="footer">
      Locked out? <a href="mailto:support@qorium.online">support@qorium.online</a>
    </p>
  </section>
</main>

<script>
(() => {
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('error');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const r = await fetch('/recruiter/api/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      if (r.ok) {
        // Cookie has been set by the server; redirect.
        window.location.replace('/recruiter/dashboard.html');
        return;
      }
      let problem;
      try { problem = await r.json(); } catch { problem = {}; }
      if (r.status === 423) {
        err.textContent = 'Account locked. Try again in 15 minutes or contact support.';
      } else if (r.status === 403) {
        err.textContent = 'Account is disabled. Contact support.';
      } else {
        err.textContent = problem.title || 'Sign in failed. Check your credentials.';
      }
    } catch (e) {
      err.textContent = 'Network error. Please try again.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
})();
</script>
</body>
</html>
