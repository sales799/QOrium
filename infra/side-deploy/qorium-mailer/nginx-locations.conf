# nginx location blocks for the qorium-mailer side-deploy.
# Drop into the api.qorium.online server { ... } block via:
#   include /opt/qorium-mailer/infra/side-deploy/qorium-mailer/nginx-locations.conf;
# Place the include line BEFORE the catch-all `location / { ... }` that
# proxies to qorium-api so these more-specific routes match first.

# /v1/auth/invite — admin-only, API-key gated. Routes to qorium-mailer.
location = /v1/auth/invite {
    proxy_pass http://127.0.0.1:5102;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Invitation send is bounded by SES latency; allow up to 30s before nginx
    # gives up. The service itself does not retry SES.
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Don't buffer the small JSON response — push it through immediately.
    proxy_buffering off;
}

# /v1/auth/accept — public, token-gated. Routes to qorium-mailer.
location = /v1/auth/accept {
    proxy_pass http://127.0.0.1:5102;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # argon2id hash takes ~50-200ms; well under default timeouts.
    proxy_connect_timeout 5s;
    proxy_send_timeout    10s;
    proxy_read_timeout    10s;
    proxy_buffering off;
}
