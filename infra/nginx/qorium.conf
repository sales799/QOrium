# QOrium nginx server block — installed at /etc/nginx/sites-available/qorium.conf
# by services/setu/bin/setu-bootstrap.sh.
#
# Routes the multi-port PM2 cluster behind one TLS host. certbot adds the
# 443 listener + cert paths automatically when run with --nginx.
#
# Note: gzip directives are NOT defined here. Most distros enable gzip in
# the top-level /etc/nginx/nginx.conf already; redeclaring it in a
# server-block context produces "duplicate" emerg errors that block
# `nginx -t`. If your distro's nginx.conf does NOT enable gzip, add it
# there (in the http {} block) rather than here.

# Upstream pools (all bound to 127.0.0.1 by PM2).
upstream qorium_readybank   { server 127.0.0.1:5101; keepalive 16; }
upstream qorium_jdforge     { server 127.0.0.1:5102; keepalive 16; }
upstream qorium_stackvault  { server 127.0.0.1:5103; keepalive 16; }
upstream qorium_admin       { server 127.0.0.1:5104; keepalive 16; }
upstream qorium_atsbridge   { server 127.0.0.1:5105; keepalive 16; }
upstream qorium_webhooks    { server 127.0.0.1:5106; keepalive 16; }
upstream qorium_sso         { server 127.0.0.1:5107; keepalive 16; }
upstream qorium_docs        { server 127.0.0.1:5108; keepalive 16; }
upstream qorium_auditlog    { server 127.0.0.1:5111; keepalive 16; }
upstream qorium_billing     { server 127.0.0.1:5112; keepalive 16; }
upstream qorium_apikeymgmt  { server 127.0.0.1:5113; keepalive 16; }
upstream qorium_uptime      { server 127.0.0.1:5114; keepalive 16; }
upstream qorium_aipair      { server 127.0.0.1:5115; keepalive 16; }
upstream qorium_candidate   { server 127.0.0.1:5116; keepalive 16; }
upstream qorium_setu        { server 127.0.0.1:5117; keepalive 16; }
upstream qorium_my          { server 127.0.0.1:5118; keepalive 16; }

# Common proxy settings (included into every location).
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection        "";
proxy_read_timeout 60s;

# ---------------------------------------------------------------------------
# api.qorium.online — primary API surface (HTTP API + Setu webhook)
# ---------------------------------------------------------------------------
server {
  listen 80;
  listen [::]:80;
  server_name api.qorium.online;

  # Setu auto-deploy webhook + status surface.
  location /setu/        { proxy_pass http://qorium_setu/; }

  # Public API surface, routed by path prefix.
  location /v1/auth/saml/   { proxy_pass http://qorium_sso; }
  location /v1/auth/oidc/   { proxy_pass http://qorium_sso; }
  location /v1/auth/        { proxy_pass http://qorium_sso; }
  location /v1/sso/         { proxy_pass http://qorium_sso; }
  location /v1/jd-forge/    { proxy_pass http://qorium_jdforge; }
  location /v1/stack-vault/ { proxy_pass http://qorium_stackvault; }
  location /v1/webhooks/    { proxy_pass http://qorium_webhooks; }
  location /v1/audit/       { proxy_pass http://qorium_auditlog; }
  location /v1/billing/     { proxy_pass http://qorium_billing; }
  location /v1/api-keys     { proxy_pass http://qorium_apikeymgmt; }
  location /v1/uptime/      { proxy_pass http://qorium_uptime; }
  location /v1/ai-pair-coding/ { proxy_pass http://qorium_aipair; }

  # ATS bridge mounts the customer-facing webhook ingress at /webhooks/<platform>/<tenant>.
  location /webhooks/       { proxy_pass http://qorium_atsbridge; }

  # ReadyBank is the catch-all for the rest of /v1/.
  location /v1/             { proxy_pass http://qorium_readybank; }

  # Service-level health (CTO + uptime monitor only).
  location = /healthz       { proxy_pass http://qorium_uptime/healthz; }

  client_max_body_size 8m;
}

# ---------------------------------------------------------------------------
# admin.qorium.online — Next.js admin app
# ---------------------------------------------------------------------------
server {
  listen 80;
  listen [::]:80;
  server_name admin.qorium.online;

  location / { proxy_pass http://qorium_admin; }
}

# ---------------------------------------------------------------------------
# docs.qorium.online — Next.js docs site
# ---------------------------------------------------------------------------
server {
  listen 80;
  listen [::]:80;
  server_name docs.qorium.online;

  location / { proxy_pass http://qorium_docs; }
}

# ---------------------------------------------------------------------------
# candidate.qorium.online — Wave 3 AI pair-coding portal
# ---------------------------------------------------------------------------
server {
  listen 80;
  listen [::]:80;
  server_name candidate.qorium.online;

  location / { proxy_pass http://qorium_candidate; }
}

# ---------------------------------------------------------------------------
# my.qorium.online — customer self-service portal (apps/my)
# ---------------------------------------------------------------------------
server {
  listen 80;
  listen [::]:80;
  server_name my.qorium.online;

  location / { proxy_pass http://qorium_my; }
}
