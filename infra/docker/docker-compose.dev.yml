name: qorium-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: qorium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qorium}
      POSTGRES_USER: ${POSTGRES_USER:-qorium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qorium_dev_password}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-qorium} -d ${POSTGRES_DB:-qorium}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: qorium-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: qorium-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-qorium_dev_access}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-qorium_dev_secret}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: qorium-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-qorium_dev_access} ${S3_SECRET_KEY:-qorium_dev_secret} &&
      mc mb --ignore-existing local/${S3_BUCKET:-qorium-dev} &&
      echo 'MinIO bucket ${S3_BUCKET:-qorium-dev} ready' &&
      exit 0
      "
    restart: 'no'

  # Judge0 runs against its own Postgres + Redis to avoid schema collision
  # with our application data.
  judge0-db:
    image: postgres:16-alpine
    container_name: qorium-judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_dev_password
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U judge0 -d judge0']
      interval: 5s
      timeout: 5s
      retries: 10

  judge0-redis:
    image: redis:7-alpine
    container_name: qorium-judge0-redis
    restart: unless-stopped
    volumes:
      - judge0_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  judge0:
    image: judge0/judge0:1.13.1
    container_name: qorium-judge0
    restart: unless-stopped
    privileged: true
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_dev_password
      REDIS_HOST: judge0-redis
      REDIS_PORT: '6379'
    ports:
      - '2358:2358'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:2358/about >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  redis_data:
  minio_data:
  judge0_postgres_data:
  judge0_redis_data:
