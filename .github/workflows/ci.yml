# QOrium CI/CD Pipeline
#
# Adapted from infra/B5-CI-Pipeline.github-actions.yml (CTO Office, 2026-05-02).
# Adaptation: package manager npm → pnpm (per handoff §3 + Sprint 0 bootstrap).
# Adaptation log: infra/CTO-deltas/CTO-DELTA-CI-pnpm-adoption.md
#
# Workflow: Triggered on push to main, PR to main, and manual dispatch.
# Jobs: lint → typecheck → test → secret-scan → build → security-audit → deploy-staging → deploy-production
#
# Node version: 20 LTS (per B5 canonical; engines.node permits ≥20)
# Test coverage threshold: ≥80% for app code (enforced by CI gate per B5 + 92-pt Quality Gate)

name: QOrium CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.33.0'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm lint
      - name: Prettier check
        run: pnpm format:check

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: TypeScript compiler
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage/'
          retention-days: 7
          if-no-files-found: ignore

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Pinned binary install instead of gitleaks/gitleaks-action@v2 — the
      # action requires a paid GITLEAKS_LICENSE for private repos since 2023.
      # This step matches the local pre-commit hook exactly (same binary, same
      # config), so PR scans cannot diverge from developer-side scans.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version
      # PR events: scan only commits introduced by this PR (base..head).
      # Push events: scan the working tree at the new tip. Either way, --config
      # points at .gitleaks.toml so the existing rules + allowlist apply.
      - name: Run gitleaks
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${BASE_REF}" --depth=1 || true
            gitleaks detect \
              --source . \
              --no-banner \
              --redact \
              --config=.gitleaks.toml \
              --log-opts="origin/${BASE_REF}..HEAD"
          else
            gitleaks detect \
              --source . \
              --no-banner \
              --redact \
              --config=.gitleaks.toml
          fi

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [typecheck, test, secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build all workspaces
        run: pnpm build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            apps/*/dist
            apps/*/.next
            services/*/dist
            packages/*/dist
          retention-days: 7
          if-no-files-found: ignore

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (production deps, fail on high)
        run: pnpm audit --prod --audit-level high
        continue-on-error: false

  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: staging
      url: https://staging.qorium.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
      - name: Deploy to staging
        run: |
          echo "Staging deploy hook — replace with actual logic (PM2 reload, etc.)"
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}

  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, security-audit]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://qorium.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
      - name: Deploy to production
        run: |
          echo "Production deploy hook — replace with actual logic (PM2 reload + smoke tests)."
        env:
          DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
