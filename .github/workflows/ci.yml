# QOrium CI/CD Pipeline
#
# Adapted from infra/B5-CI-Pipeline.github-actions.yml (CTO Office, 2026-05-02).
# Adaptation: package manager npm → pnpm (per handoff §3 + Sprint 0 bootstrap).
# Adaptation log: infra/CTO-deltas/CTO-DELTA-CI-pnpm-adoption.md
#
# Workflow: Triggered on push to main, PR to main, and manual dispatch.
# Jobs: lint → typecheck → test → secret-scan → build → security-audit → deploy-staging → deploy-production
#
# Node version: 20 LTS (per B5 canonical; engines.node permits ≥20)
# Test coverage threshold: ≥80% for app code (enforced by CI gate per B5 + 92-pt Quality Gate)

name: QOrium CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.33.0'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm lint
      - name: Prettier check
        run: pnpm format:check

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build workspace declarations
        # @qorium/auth + services/readybank typecheck against @qorium/db's
        # emitted .d.ts (its package.json exports.types points to
        # ./dist/index.d.ts, not source). Build the dependency workspaces
        # first so cross-workspace types resolve. The marketing app does
        # not produce dist/ during build but its `next build` is heavier;
        # we run only declaration-emit for non-marketing here.
        run: pnpm run build:packages
      - name: TypeScript compiler
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: qorium
          POSTGRES_PASSWORD: qorium_test
          POSTGRES_DB: qorium_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U qorium -d qorium_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://qorium:qorium_test@localhost:5432/qorium_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: qorium_test
      POSTGRES_USER: qorium
      POSTGRES_PASSWORD: qorium_test
      REDIS_URL: redis://localhost:6379
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build workspace declarations
        run: pnpm run build:packages
      - name: Run database migrations (best-effort)
        run: pnpm --filter @qorium/db migrate:up || echo "migrations skipped"
        continue-on-error: true
      - name: Run tests with coverage
        run: pnpm test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage/'
          retention-days: 7
          if-no-files-found: ignore

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Direct gitleaks binary install instead of gitleaks-action — the action
      # requires GITLEAKS_LICENSE for org repos and exits silently otherwise.
      # The binary is free for any usage on personal/single-org repos.
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin/ gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan repo for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --exit-code 1

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [typecheck, test, secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build all workspaces
        run: pnpm build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            apps/*/dist
            apps/*/.next
            services/*/dist
            packages/*/dist
          retention-days: 7
          if-no-files-found: ignore

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (production deps, fail on high)
        run: pnpm audit --prod --audit-level high
        continue-on-error: false

  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: staging
      url: https://staging.qorium.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
      - name: Deploy to staging
        run: |
          echo "Staging deploy hook — replace with actual logic (PM2 reload, etc.)"
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}

  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, security-audit]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://qorium.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
      - name: Deploy to production
        run: |
          echo "Production deploy hook — replace with actual logic (PM2 reload + smoke tests)."
        env:
          DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
