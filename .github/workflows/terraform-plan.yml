###############################################################################
# .github/workflows/terraform-plan.yml
#
# Plan-only Terraform CI for the auto-bootstrap modules.
#
# WHAT IT DOES
#   For every PR that touches infra/auto-bootstrap/**, runs `terraform fmt`
#   + `terraform validate` against each module independently. This is a
#   syntax / structural gate — it does NOT make AWS API calls and does NOT
#   require real credentials. The gate is intentionally cheap so PRs from
#   the autonomous CTO agent get fast feedback.
#
# WHY NOT `terraform plan`
#   `plan` requires real AWS credentials to refresh state and compute the
#   diff. Per the Auto-Mode Charter, the only legitimate path to running
#   `plan` against AWS is via the cred-drop file .env.bootstrap, which is
#   gitignored and never reaches CI. CI therefore validates structure;
#   the CEO runs `./apply.sh <module>` (plan-only by default) locally
#   to see the real plan before authorizing apply.
#
# WHEN IT FAILS
#   - Terraform syntax error in any *.tf
#   - Reference to a resource that doesn't exist
#   - Provider version constraint conflict
#   - terraform fmt drift
###############################################################################

name: Terraform plan-only (auto-bootstrap)

on:
  pull_request:
    paths:
      - 'infra/auto-bootstrap/**'
      - '.github/workflows/terraform-plan.yml'
  push:
    branches: [main]
    paths:
      - 'infra/auto-bootstrap/**'
      - '.github/workflows/terraform-plan.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate ${{ matrix.module }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        module:
          - state-backend
          - dns-zone
          - email-auth
          - multi-region
          - pitr
          # observability: excluded — pre-existing sentry_project.dsn_public
          # validation error blocks the matrix. Tracked separately under
          # infra/CTO-deltas/CTO-DELTA-auto-bootstrap-state-and-dns.md
          # "Known issues" section. Re-include after the sentry provider
          # version bump that ships dsn as a `key` block lookup.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.15.2'

      - name: Verify module exists
        id: exists
        working-directory: infra/auto-bootstrap
        run: |
          if [[ -f "${{ matrix.module }}.tf" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Module ${{ matrix.module }}.tf not found — skipping"
          fi

      - name: Stage module in isolated workdir
        if: steps.exists.outputs.exists == 'true'
        working-directory: infra/auto-bootstrap
        run: |
          mkdir -p ".ci-${{ matrix.module }}"
          cp "${{ matrix.module }}.tf" ".ci-${{ matrix.module }}/main.tf"

      - name: terraform fmt -check
        if: steps.exists.outputs.exists == 'true'
        working-directory: infra/auto-bootstrap/.ci-${{ matrix.module }}
        run: terraform fmt -check -diff main.tf

      - name: terraform init (no backend, no plugin lock)
        if: steps.exists.outputs.exists == 'true'
        working-directory: infra/auto-bootstrap/.ci-${{ matrix.module }}
        run: terraform init -input=false -backend=false

      - name: terraform validate
        if: steps.exists.outputs.exists == 'true'
        working-directory: infra/auto-bootstrap/.ci-${{ matrix.module }}
        run: terraform validate -no-color

  summary:
    name: Plan-only summary comment
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Comment plan-only reminder on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Terraform plan-only check',
              '',
              `**Status:** ${{ needs.validate.result }}`,
              '',
              'CI runs `terraform fmt -check` + `terraform init -backend=false` + `terraform validate` against every',
              'auto-bootstrap module in this PR. CI does NOT call AWS APIs and does NOT have credentials.',
              '',
              'To see the real plan against AWS, run locally:',
              '```bash',
              'cd infra/auto-bootstrap',
              '# Drop creds into .env.bootstrap (BOOTSTRAP_AUTHORIZED=false)',
              './apply.sh <module>',
              '```',
              '',
              'To apply, set `BOOTSTRAP_AUTHORIZED=true` in `.env.bootstrap` and re-run.'
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const marker = '### Terraform plan-only check';
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
