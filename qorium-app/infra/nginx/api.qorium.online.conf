# Reference Nginx block for the QOrium production API host.
#
# This is the QG-05 health-routing contract for api.qorium.online. Keep
# /healthz on the DB-backed ReadyBank service so production gates can assert
# service, git_sha, and checks.db parity between public Cloudflare traffic,
# forced VPS-origin traffic, and the direct PM2 service.
#
# Do not enable this file next to another api.qorium.online server block; use it
# as the managed reference when updating /etc/nginx/sites-enabled/qorium.conf.

upstream qorium_readybank { server 127.0.0.1:5101; keepalive 16; }
upstream qorium_jdforge { server 127.0.0.1:5102; keepalive 16; }
upstream qorium_stackvault { server 127.0.0.1:5103; keepalive 16; }
upstream qorium_atsbridge { server 127.0.0.1:5105; keepalive 16; }
upstream qorium_webhooks { server 127.0.0.1:5106; keepalive 16; }
upstream qorium_sso { server 127.0.0.1:5107; keepalive 16; }
upstream qorium_auditlog { server 127.0.0.1:5111; keepalive 16; }
upstream qorium_billing { server 127.0.0.1:5112; keepalive 16; }
upstream qorium_apikeymgmt { server 127.0.0.1:5113; keepalive 16; }
upstream qorium_uptime { server 127.0.0.1:5114; keepalive 16; }
upstream qorium_aipair { server 127.0.0.1:5115; keepalive 16; }
upstream qorium_setu { server 127.0.0.1:5117; keepalive 16; }

proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection "";
proxy_read_timeout 60s;

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.qorium.online;

  ssl_certificate /etc/letsencrypt/live/api.qorium.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.qorium.online/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 8m;
  access_log /var/log/nginx/qorium-api.access.log;
  error_log /var/log/nginx/qorium-api.error.log warn;

  location /setu/ { proxy_pass http://qorium_setu/; }

  location /v1/auth/saml/ { proxy_pass http://qorium_sso; }
  location /v1/auth/oidc/ { proxy_pass http://qorium_sso; }
  location /v1/auth/ { proxy_pass http://qorium_sso; }
  location /v1/sso/ { proxy_pass http://qorium_sso; }
  location /v1/jd-forge/ { proxy_pass http://qorium_jdforge; }
  location /v1/stack-vault/ { proxy_pass http://qorium_stackvault; }
  location /v1/webhooks/ { proxy_pass http://qorium_webhooks; }
  location /v1/audit/ { proxy_pass http://qorium_auditlog; }
  location /v1/billing/ { proxy_pass http://qorium_billing; }
  location /v1/api-keys { proxy_pass http://qorium_apikeymgmt; }
  location /v1/uptime/ { proxy_pass http://qorium_uptime; }
  location /v1/ai-pair-coding/ { proxy_pass http://qorium_aipair; }

  location /webhooks/ { proxy_pass http://qorium_atsbridge; }

  location /v1/ { proxy_pass http://qorium_readybank; }
  location = /healthz { proxy_pass http://qorium_readybank/healthz; }
}

server {
  listen 80;
  listen [::]:80;
  server_name api.qorium.online;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}
