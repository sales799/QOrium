services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: qorium
      POSTGRES_PASSWORD: qorium
      POSTGRES_DB: qorium
    ports:
      - "5432:5432"
    volumes:
      - qorium_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  qorium_pg:
